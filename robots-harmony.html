<!DOCTYPE html>
<html>
<head>
    <title>Robots Gallery</title>
    <link href="robots-harmony.css" rel="stylesheet"/>
</head>
<body>
    <!-- AUDIO ELEMENTS HOVER -->
    <audio id="alex-sound" preload="auto">
    <source src="audio/baby-cry-101477.mp3" type="audio/mpeg">
</audio>

<audio id="kostas-sound" preload="auto">

    <div id="title">

            </section>
